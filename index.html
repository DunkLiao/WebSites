<!DOCTYPE html>

    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Google Fonts: Noto Sans TC 讓中文字體更乾淨 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            /* 經典子彈筆記的點陣背景 (Dot Grid) */
            background-color: #faf9f6; /* 溫暖的紙張白 */
            background-image: radial-gradient(#d1cdxc 1px, transparent 1px), radial-gradient(#d1cdc5 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: #333333;
        }

        /* 筆記本的頁面容器陰影與質感 */
        .journal-page {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), 
                        0 1px 3px rgba(0,0,0,0.03),
                        inset 0 0 50px rgba(255,255,255,0.5);
            position: relative;
        }

        /* 左側的紅線 (模擬筆記本邊界) */
        .journal-page::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 48px;
            width: 2px;
            background-color: rgba(220, 53, 69, 0.2);
            z-index: 0;
        }

        @media (max-width: 640px) {
            .journal-page::before {
                left: 24px;
            }
        }

        /* 螢光筆畫線效果 (Hover狀態) */
        .highlighter {
            position: relative;
            z-index: 1;
            display: inline-block;
        }
        
        .highlighter::after {
            content: '';
            position: absolute;
            left: -2px;
            right: -2px;
            bottom: 4px;
            height: 40%;
            background-color: #fef08a; /* Tailwind 黃色 200 */
            z-index: -1;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            opacity: 0.8;
            border-radius: 2px;
        }

        .group:hover .highlighter::after {
            transform: scaleX(1);
        }

        /* 自訂子彈符號變換動畫 */
        .bullet-icon {
            transition: all 0.2s ease;
        }
        .group:hover .bullet-icon {
            transform: scale(1.1);
            color: #111827; /* 更深的顏色 */
        }
    </style>
</head>
